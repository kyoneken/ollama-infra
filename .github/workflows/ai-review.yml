name: AI Code Review

# Triggers on PR open, update, or reopen
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-review:
    name: AI Code Review (Ollama)
    runs-on: ubuntu-latest
    # Model download can take a few minutes on first run
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate PR diff
        run: |
          # Exclude infrastructure files; review only source code changes
          git diff origin/${{ github.base_ref }}...HEAD -- \
            ':(exclude)Dockerfile' \
            ':(exclude)entrypoint.sh' \
            ':(exclude).github/' \
            ':(exclude)*.md' \
            ':(exclude).copilot/' \
            > ${{ github.workspace }}/pr.diff
          # Fall back to full diff if the filtered diff is empty
          if [[ ! -s ${{ github.workspace }}/pr.diff ]]; then
            git diff origin/${{ github.base_ref }}...HEAD > ${{ github.workspace }}/pr.diff
          fi
          echo "Diff size: $(wc -c < ${{ github.workspace }}/pr.diff) bytes"

      # Cache the Docker image layers to speed up subsequent runs
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile', 'entrypoint.sh') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: ollama-review:latest
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Rotate cache to avoid unbounded growth
      - name: Rotate build cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Run AI code review
        id: review
        run: |
          # Write review output to workspace so it survives container exit
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            -e REVIEW_OUTPUT=/workspace/review_output.txt \
            ollama-review
        # Allow the step to continue even if the review exits non-zero
        continue-on-error: true

      - name: Post review as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const outputPath = `${process.env.GITHUB_WORKSPACE}/review_output.txt`;

            let reviewText;
            try {
              reviewText = fs.readFileSync(outputPath, 'utf8').trim();
            } catch (e) {
              reviewText = '_Review output file not found. The container may have failed to start._';
            }

            if (!reviewText) {
              reviewText = '_No review output was produced._';
            }

            const poweredBy = `Powered by [Ollama](https://ollama.com) running \`qwen2.5-coder:1.5b\` inside this repo's Docker image.`;
            const warning = '⚠️ First run may take a few minutes while the model is downloaded inside the container.';
            const logsUrl = context.payload.pull_request
              ? `${context.payload.pull_request.html_url}/checks`
              : '';
            const footer = logsUrl
              ? `<sub>Generated by the <code>ai-review</code> workflow · <a href="${logsUrl}">View job logs</a></sub>`
              : '<sub>Generated by the <code>ai-review</code> workflow</sub>';

            const body = [
              '## 🤖 AI Code Review',
              '',
              poweredBy,
              warning,
              '',
              reviewText,
              '',
              '---',
              footer,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
