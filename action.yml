name: 'Ollama AI Code Review'
description: 'Offline LLM-powered code review using Ollama. No API key required.'
author: 'kyoneken'

inputs:
  github-token:
    description: 'GitHub token for posting PR comments (use secrets.GITHUB_TOKEN)'
    required: true
  model:
    description: 'Ollama model name override. Defaults to pre-installed model (qwen2.5-coder:1.5b).'
    required: false
    default: ''
  base-ref:
    description: 'Base branch ref for diff generation (defaults to github.base_ref)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Generate PR diff
      shell: bash
      run: |
        BASE="${{ inputs.base-ref }}"
        if [[ -z "$BASE" ]]; then
          BASE="${{ github.base_ref }}"
        fi
        git diff "origin/${BASE}...HEAD" -- \
          ':(exclude)Dockerfile' \
          ':(exclude)entrypoint.sh' \
          ':(exclude).github/' \
          ':(exclude)*.md' \
          > "${{ github.workspace }}/pr.diff" || true
        # Fall back to full diff if filtered diff is empty
        if [[ ! -s "${{ github.workspace }}/pr.diff" ]]; then
          git diff "origin/${BASE}...HEAD" > "${{ github.workspace }}/pr.diff" || true
        fi
        echo "Diff size: $(wc -c < '${{ github.workspace }}/pr.diff') bytes"

    - name: Pull Docker image
      shell: bash
      run: docker pull ghcr.io/kyoneken/ollama-review:latest

    - name: Run AI code review
      shell: bash
      run: |
        docker run --rm \
          -v "${{ github.workspace }}:/workspace" \
          -e GITHUB_TOKEN="${{ inputs.github-token }}" \
          -e COPILOT_MODEL="${{ inputs.model }}" \
          -e REVIEW_OUTPUT=/workspace/review_output.txt \
          ghcr.io/kyoneken/ollama-review:latest

    - name: Post review as PR comment
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const outputPath = `${process.env.GITHUB_WORKSPACE}/review_output.txt`;

          let reviewText;
          try {
            reviewText = fs.readFileSync(outputPath, 'utf8').trim();
          } catch (e) {
            reviewText = '_Review output file not found. The container may have failed to start._';
          }

          if (!reviewText) {
            reviewText = '_No review output was produced._';
          }

          const poweredBy = 'Powered by [Ollama](https://ollama.com) running `qwen2.5-coder:1.5b` (pre-installed in Docker image).';
          const logsUrl = context.payload.pull_request
            ? `${context.payload.pull_request.html_url}/checks`
            : '';
          const footer = logsUrl
            ? `<sub>Generated by the <code>ai-review</code> workflow via <a href="https://github.com/kyoneken/ollama-infra">kyoneken/ollama-infra</a> · <a href="${logsUrl}">View job logs</a></sub>`
            : '<sub>Generated by the <code>ai-review</code> workflow via kyoneken/ollama-infra</sub>';

          const body = [
            '## 🤖 AI Code Review',
            '',
            poweredBy,
            '',
            reviewText,
            '',
            '---',
            footer,
          ].join('\n');

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body,
          });

branding:
  icon: 'cpu'
  color: 'green'
