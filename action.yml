name: 'Ollama AI Code Review'
description: 'Offline LLM-powered code review using Ollama. No API key required.'
author: 'kyoneken'

inputs:
  github-token:
    description: 'GitHub token for posting PR comments (use secrets.GITHUB_TOKEN)'
    required: true
  model:
    description: 'Ollama model name override. Defaults to pre-installed model (qwen2.5-coder:1.5b).'
    required: false
    default: ''
  base-ref:
    description: 'Base branch ref for diff generation (defaults to github.base_ref)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Generate PR diff
      shell: bash
      run: |
        BASE="${{ inputs.base-ref }}"
        if [[ -z "$BASE" ]]; then
          BASE="${{ github.base_ref }}"
        fi
        git diff "origin/${BASE}...HEAD" -- \
          ':(exclude)Dockerfile' \
          ':(exclude)entrypoint.sh' \
          ':(exclude).github/' \
          ':(exclude)*.md' \
          > "${{ github.workspace }}/pr.diff" || true
        # Fall back to full diff if filtered diff is empty
        if [[ ! -s "${{ github.workspace }}/pr.diff" ]]; then
          git diff "origin/${BASE}...HEAD" > "${{ github.workspace }}/pr.diff" || true
        fi
        echo "Diff size: $(wc -c < '${{ github.workspace }}/pr.diff') bytes"

    - name: Log in to GHCR
      shell: bash
      run: echo "${{ inputs.github-token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Pull Docker image
      shell: bash
      run: docker pull ghcr.io/kyoneken/ollama-review:latest

    - name: Run AI code review
      shell: bash
      run: |
        docker run --rm \
          -v "${{ github.workspace }}:/workspace" \
          -e GITHUB_TOKEN="${{ inputs.github-token }}" \
          -e GH_TOKEN="${{ inputs.github-token }}" \
          -e GH_COPILOT_ENDPOINT="http://localhost:11434" \
          -e COPILOT_MODEL="${{ inputs.model }}" \
          -e REVIEW_OUTPUT=/workspace/review_output.txt \
          ghcr.io/kyoneken/ollama-review:latest

    - name: Post review as PR comment
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const outputPath = `${process.env.GITHUB_WORKSPACE}/review_output.txt`;

          let rawText;
          try {
            rawText = fs.readFileSync(outputPath, 'utf8').trim();
          } catch (e) {
            rawText = '';
          }

          const severityIcon = s => s === 'ERROR' ? '🔴' : s === 'WARNING' ? '🟡' : '🔵';
          const issues = (rawText || '').split('\n')
            .map(l => l.trim())
            .filter(l => l && !l.startsWith('FILE|'))
            .map(l => {
              const p = l.split('|');
              if (p.length < 5) return null;
              const [file, line, sev, issue, fix, reason] = p.map(x => x.trim());
              return { file, line: parseInt(line) || 0, sev, issue, fix, reason };
            })
            .filter(Boolean);

          const poweredBy = '[Ollama](https://ollama.com) で `qwen2.5-coder:1.5b`（Dockerイメージにプリインストール済み）を使用してレビューを実行しました。';
          const logsUrl = context.payload.pull_request
            ? `${context.payload.pull_request.html_url}/checks`
            : '';
          const footer = logsUrl
            ? `<sub>${poweredBy} · <a href="${logsUrl}">ログを表示</a></sub>`
            : `<sub>${poweredBy}</sub>`;

          if (issues.length === 0) {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 AIコードレビュー\n\n✅ 問題は検出されませんでした。\n\n---\n${footer}`,
            });
            return;
          }

          // Post a summary review first, then individual inline comments via createReviewComment
          const commitId = context.payload.pull_request.head.sha;
          const reviewBody = `## 🤖 AIコードレビュー\n\n${issues.length}件の指摘があります。\n\n---\n${footer}`;

          // Post summary review (no inline comments — avoids createReview position limitations)
          await github.rest.pulls.createReview({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number,
            commit_id: commitId,
            event: 'COMMENT',
            body: reviewBody,
          });

          // Post each issue as an individual inline comment using createReviewComment
          // (supports line + side directly, unlike createReview.comments[])
          for (const i of issues.filter(x => x.line > 0)) {
            const body = [
              `${severityIcon(i.sev)} **${i.sev}**`,
              '',
              `**問題:** ${i.issue}`,
              `**修正案:** \`${i.fix}\``,
              i.reason ? `**なぜ修正が必要か:** ${i.reason}` : '',
            ].filter(x => x !== '').join('\n');
            try {
              await github.rest.pulls.createReviewComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                commit_id: commitId,
                path: i.file,
                line: i.line,
                side: 'RIGHT',
                body,
              });
            } catch (e) {
              core.warning(`Inline comment failed for ${i.file}:${i.line} (${e.message})`);
            }
          }

branding:
  icon: 'cpu'
  color: 'green'
